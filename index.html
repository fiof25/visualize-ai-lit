<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>orbs</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #EDE7D8; cursor: crosshair; }
    canvas { display: block; }
    #cursor {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 200;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px;
      background: rgba(60, 45, 25, 0.28);
      transition: width .20s ease, height .20s ease;
    }
    #cursor.big { width: 28px; height: 28px; background: rgba(60, 45, 25, 0.07); }
  </style>
</head>
<body>
<div id="cursor"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(p => {
  'use strict';

  // Cotton watercolour paper — warm off-white
  const PR = 242, PG = 237, PB = 225;

  // Diluted wash colours — think "tube paint + a lot of water on wet paper",
  // not straight pigment. Light enough that MULTIPLY overlaps stay soft.
  const COLORS = [
    [238, 152, 128],  // rose madder — warm coral
    [148, 182, 230],  // cerulean — sky blue
    [244, 210, 108],  // aureolin — sunny yellow
    [148, 198, 162],  // viridian wash — soft sage
    [230, 162, 195],  // quinacridone — petal pink
  ];

  const cursorEl = document.getElementById('cursor');
  let W, H;

  const mouse = { x: -9999, y: -9999 };
  let balls  = [];
  let simT   = 0;

  // ── WEIGHTED RANDOM ──────────────────────────────────────────────────────────
  // Biases values toward 0.5 — midpoint of an edge is more likely than the ends.
  // Matches the distribute() in the user's original watercolour code.
  function wrand() {
    const x = p.random();
    return Math.pow((x - 0.5) * 1.58740105, 3) + 0.5;
  }

  // ── POLYGON GROW (the core watercolour algorithm) ────────────────────────────
  // Subdivides every edge: keeps the original vertex, then inserts a new midpoint
  // displaced perpendicular to the edge by a fraction of its length.
  // Repeated calls produce organic, fractal-like blobs that look like wet paint.
  function growPoly({ verts, mods }) {
    const newV = [], newM = [];
    const n    = verts.length;
    const clamp = m => Math.min(0.92, Math.max(0.05, m + (wrand() - 0.5) * 0.12));

    for (let i = 0; i < n; i++) {
      const j   = (i + 1) % n;
      const v1  = verts[i], v2 = verts[j];
      const mod = mods[i];

      // Original vertex stays
      newV.push({ x: v1.x, y: v1.y });
      newM.push(clamp(mod));

      // Displaced midpoint
      const sx   = v2.x - v1.x,  sy   = v2.y - v1.y;
      const len  = Math.hypot(sx, sy);
      const t    = wrand();                                  // biased along edge
      let   mx   = v1.x + sx * t, my = v1.y + sy * t;
      const perp = Math.atan2(sy, sx) - Math.PI / 2 + (wrand() - 0.5) * Math.PI / 4;
      const disp = wrand() * len * 0.5 * mod;               // scale by modifier
      mx += Math.cos(perp) * disp;
      my += Math.sin(perp) * disp;

      newV.push({ x: mx, y: my });
      newM.push(clamp(mod));
    }
    return { verts: newV, mods: newM };
  }

  function drawPoly({ verts }) {
    p.beginShape();
    for (const { x, y } of verts) p.vertex(x, y);
    p.endShape(p.CLOSE);
  }

  // ── FLOW FIELD ───────────────────────────────────────────────────────────────
  function flowAngle(x, y, t) {
    return (
      Math.sin(x * 0.0028 + t * 0.22) * Math.cos(y * 0.0022 + t * 0.18) +
      Math.cos(x * 0.0018 - y * 0.0024 + t * 0.14) * 0.55 +
      Math.sin(x * 0.004  + y * 0.003  + t * 0.30) * 0.3
    ) * Math.PI;
  }

  // ── BALL ─────────────────────────────────────────────────────────────────────
  class Ball {
    constructor(i) {
      const ang    = (i / 30) * Math.PI * 2 + Math.random() * 0.9;
      const spread = 0.14 + Math.random() * 0.42;
      this.x  = W * 0.5 + Math.cos(ang) * W * spread;
      this.y  = H * 0.5 + Math.sin(ang) * H * spread * 0.8;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.color  = COLORS[i % COLORS.length];
      this.phase  = Math.random() * Math.PI * 2;
      this.wobble = 0.35 + Math.random() * 0.9;
      this.pulseT = Math.random() * Math.PI * 2;
      this.baseR  = 42 + Math.random() * 22;   // varied drop sizes
      this.r      = this.baseR;
    }

    tick(t, mx, my) {
      this.pulseT += 0.010;
      this.r = this.baseR * (1 + Math.sin(this.pulseT) * 0.010);

      // Flow field
      const angle = flowAngle(this.x, this.y, t + this.phase * 0.4);
      const fMag  = 0.010 * this.wobble;
      this.vx += Math.cos(angle) * fMag;
      this.vy += Math.sin(angle) * fMag;

      // Mouse repulsion
      const dx = this.x - mx, dy = this.y - my;
      const md = Math.hypot(dx, dy);
      if (md < 220 && md > 0.5) {
        const f = ((220 - md) / 220) ** 2.2;
        this.vx += (dx / md) * f;
        this.vy += (dy / md) * f;
      }

      // Soft centre gravity
      const cd   = Math.hypot(this.x - W * 0.5, this.y - H * 0.5);
      const maxD = Math.min(W, H) * 0.52;
      if (cd > maxD) {
        const pull = (cd - maxD) * 0.00026;
        this.vx += (W * 0.5 - this.x) / cd * pull;
        this.vy += (H * 0.5 - this.y) / cd * pull;
      }

      // Heavy fluid damping — viscous, like pigment in water
      this.vx *= 0.970;
      this.vy *= 0.970;
      const spd = Math.hypot(this.vx, this.vy);
      if (spd > 2.0) { this.vx = this.vx / spd * 2.0; this.vy = this.vy / spd * 2.0; }

      this.x += this.vx;
      this.y += this.vy;

      // Soft wall push
      const pad = this.r * 0.4;
      if (this.x < pad)      this.vx += (pad - this.x)       * 0.06;
      if (this.x > W - pad)  this.vx -= (this.x - (W - pad)) * 0.06;
      if (this.y < pad)      this.vy += (pad - this.y)        * 0.06;
      if (this.y > H - pad)  this.vy -= (this.y - (H - pad)) * 0.06;
    }
  }

  // ── COLLISION ────────────────────────────────────────────────────────────────
  function resolveAll() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy) || 0.001;
        const minD = a.r + b.r + 4;
        if (dist >= minD) continue;
        const nx = dx / dist, ny = dy / dist;
        const ov = (minD - dist) * 0.5;
        a.x -= nx * ov; a.y -= ny * ov;
        b.x += nx * ov; b.y += ny * ov;
        const dv = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
        if (dv > 0) continue;
        const imp = dv * 0.25;
        a.vx -= imp * nx; a.vy -= imp * ny;
        b.vx += imp * nx; b.vy += imp * ny;
      }
    }
  }

  // ── SCATTER ──────────────────────────────────────────────────────────────────
  function scatter(cx, cy) {
    balls.forEach(b => {
      const dx = b.x - cx, dy = b.y - cy;
      const d  = Math.hypot(dx, dy) || 0.5;
      const R  = 460;
      if (d < R) {
        const f = ((R - d) / R) ** 1.5 * 5.0;
        b.vx += (dx / d) * f;
        b.vy += (dy / d) * f;
      }
    });
  }

  // ── WATERCOLOUR RENDER ───────────────────────────────────────────────────────
  // Mirrors the waterColour() function from the user's reference code, adapted
  // for animation: octagon base → 2 initial grows → N layers each with a
  // temporary grow (not saved), one mid-loop saved grow for more detail.
  function renderWatercolour(ball) {
    const [rv, gv, bv] = ball.color;

    // 16 transparent layers — fewer = lighter, more dilute wash feel
    const numLayers  = 16;
    const layerAlpha = 255 / (2 * numLayers); // ≈ 8

    p.fill(rv, gv, bv, layerAlpha);
    p.noStroke();

    // Octagon starting shape centred on ball
    const n     = 8;
    const verts = Array.from({ length: n }, (_, i) => {
      const a = (i / n) * Math.PI * 2;
      return { x: ball.x + Math.cos(a) * ball.r,
               y: ball.y + Math.sin(a) * ball.r };
    });
    const mods = Array.from({ length: n }, () => p.random(0.15, 0.72));

    // Two initial grows — 8 → 16 → 32 verts, organic base shape
    let poly = growPoly(growPoly({ verts, mods }));

    for (let i = 0; i < numLayers; i++) {
      // Mid-loop saved grow adds fine edge detail, matching the original's
      // two periodic poly = poly.grow().grow() at ⅓ and ⅔ through the loop
      // One mid-loop grow — lighter than two, edges stay softer
      if (i === Math.floor(numLayers / 2)) {
        poly = growPoly(poly); // 32 → 64 verts
      }
      // Temporary grow for this layer — different each call, not saved
      drawPoly(growPoly(poly));
    }
  }

  // ── SETUP & DRAW ─────────────────────────────────────────────────────────────
  p.setup = () => {
    W = window.innerWidth;
    H = window.innerHeight;
    p.createCanvas(W, H);
    p.background(PR, PG, PB);  // begin with blank paper

    balls = Array.from({ length: 30 }, (_, i) => new Ball(i));

    // Pre-warm: settle physics before first render
    for (let i = 0; i < 500; i++) {
      balls.forEach(b => b.tick(i * 0.001, -9999, -9999));
      for (let s = 0; s < 3; s++) resolveAll();
    }
  };

  p.windowResized = () => {
    W = window.innerWidth; H = window.innerHeight;
    p.resizeCanvas(W, H);
    p.background(PR, PG, PB);
  };

  p.draw = () => {
    // ① Wet paper fade ─────────────────────────────────────────────────────────
    // Instead of clearing the canvas, we bleed it back toward the paper colour
    // at a low alpha. Old paint slowly "dries out", leaving ghostly impressions
    // that last ~20 frames — the visual memory of where paint has been.
    p.blendMode(p.BLEND);
    p.noStroke();
    p.fill(PR, PG, PB, 45);   // alpha 45 ≈ 12-frame drying trail
    p.rect(0, 0, W, H);

    // ② Physics step
    simT += 0.001;
    balls.forEach(b => b.tick(simT, mouse.x, mouse.y));
    for (let s = 0; s < 3; s++) resolveAll();

    // ③ Pigment — MULTIPLY blend makes overlapping colours mix like real paint.
    // Red + blue → muddy purple/brown, just like pigments on wet paper.
    p.blendMode(p.MULTIPLY);
    balls.forEach(b => renderWatercolour(b));

  };

  // ── INPUT ─────────────────────────────────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY;
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursorEl.classList.add('big'));
  document.addEventListener('mouseup',   () => cursorEl.classList.remove('big'));
  document.addEventListener('click',     e => scatter(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => {
    const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY;
  }, { passive: true });
  document.addEventListener('touchstart', e => {
    const t = e.touches[0]; scatter(t.clientX, t.clientY);
  }, { passive: true });
});
</script>
</body>
</html>
